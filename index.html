<style>
  #toc { display: none !important; }

  /* ── Google Fonts: DM Mono for dates ── */
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400&display=swap');

  /* ── CSS variables — adjust to match your theme ── */
  :root {
    --pg-bg:     #faf9f6;
    --pg-hover:  #f0ebe4;
    --pg-border: #e2ddd8;
    --pg-title:  #1a1714;
    --pg-body:   #5c564f;
    --pg-muted:  #9e9188;
    --pg-accent: #b08d72;
  }

  /* ── Grid container ── */
  .posts-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-auto-rows: minmax(180px, auto);
    gap: 2px;
    margin: 2rem 0 3rem;
  }

  /* ── Base card ── */
  .post-card {
    grid-column: span 2;
    grid-row: span 1;
    position: relative;
    background: var(--pg-bg);
    border: 1px solid var(--pg-border);
    overflow: hidden;
    transition: background 0.18s ease;
  }

  .post-card:hover {
    background: var(--pg-hover);
  }

  /* Large card: every 1st in a group of 3 (items 1, 4, 7 …) */
  .post-card:nth-child(3n + 1) {
    grid-column: span 4;
    grid-row: span 2;
  }

  /* Alternate rhythm: items 4, 10… shift large card to the right */
  .post-card:nth-child(6n + 4) {
    grid-column: 3 / span 4;
  }

  /* ── Inner content ── */
  .post-card__link {
    display: block;
    height: 100%;
    text-decoration: none;
    color: inherit;
  }

  .post-card__inner {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    height: 100%;
    padding: 1.4rem 1.6rem;
    box-sizing: border-box;
  }

  .post-card__date {
    display: block;
    font-family: 'DM Mono', 'Fira Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--pg-muted);
    margin-bottom: 0.55rem;
  }

  .post-card__title {
    margin: 0 0 0.6rem;
    font-size: 1rem;
    font-weight: 600;
    line-height: 1.3;
    color: var(--pg-title);
  }

  .post-card:nth-child(3n + 1) .post-card__title {
    font-size: 1.35rem;
  }

  .post-card__desc {
    margin: 0 0 1rem;
    font-size: 0.82rem;
    line-height: 1.55;
    color: var(--pg-body);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .post-card:not(:nth-child(3n + 1)) .post-card__desc {
    -webkit-line-clamp: 2;
  }

  .post-card__arrow {
    font-size: 0.9rem;
    color: var(--pg-accent);
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.15s ease, transform 0.15s ease;
    display: inline-block;
  }

  .post-card:hover .post-card__arrow {
    opacity: 1;
    transform: translateX(0);
  }

  /* Accent top border on large cards */
  .post-card:nth-child(3n + 1)::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--pg-accent);
  }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    .posts-grid {
      grid-template-columns: 1fr 1fr;
      grid-auto-rows: minmax(140px, auto);
    }
    .post-card,
    .post-card:nth-child(3n + 1),
    .post-card:nth-child(6n + 4) {
      grid-column: span 2;
      grid-row: span 1;
    }
    .post-card:nth-child(3n + 1) .post-card__title {
      font-size: 1rem;
    }
  }

  @media (max-width: 480px) {
    .posts-grid { grid-template-columns: 1fr; }
    .post-card,
    .post-card:nth-child(3n + 1),
    .post-card:nth-child(6n + 4) {
      grid-column: span 1;
    }
  }
</style>
