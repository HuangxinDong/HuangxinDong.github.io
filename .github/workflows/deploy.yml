name: Deploy Hakyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force clean rebuild (ignore cache)'
        type: boolean
        default: false
      run_cabal_update:
        description: 'Run cabal update before building'
        type: boolean
        default: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Runs in parallel with build — no Haskell compile needed
  hlint:
    name: HLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: haskell-actions/hlint-setup@v2
        with:
          version: '3.8'
      - run: hlint site.hs src/ Formatter.hs

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.6.7'
          cabal-version: 'latest'

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: ~/.cabal/store
          key: ${{ runner.os }}-ghc-9.6.7-cabal-store-${{ hashFiles('**/*.cabal') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.6.7-cabal-store-

      - name: Cache dist-newstyle
        uses: actions/cache@v4
        with:
          path: dist-newstyle
          key: ${{ runner.os }}-ghc-9.6.7-dist-${{ hashFiles('**/*.cabal') }}-${{ hashFiles('site.hs', 'Formatter.hs') }}
          restore-keys: |
            ${{ runner.os }}-ghc-9.6.7-dist-${{ hashFiles('**/*.cabal') }}-
            ${{ runner.os }}-ghc-9.6.7-dist-

      - name: Cache Hakyll incremental data
        uses: actions/cache@v4
        with:
          path: _cache
          # Key on site logic only; Hakyll incremental build handles content changes itself
          key: ${{ runner.os }}-hakyll-${{ hashFiles('site.hs', 'templates/**', 'filters/**') }}
          restore-keys: |
            ${{ runner.os }}-hakyll-

      - name: Install Pandoc
        run: |
          PANDOC_VER=3.6.4
          curl -fsSL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VER}/pandoc-${PANDOC_VER}-linux-amd64.tar.gz" \
            | sudo tar -xz --strip-components=2 -C /usr/local/bin pandoc-${PANDOC_VER}/bin/pandoc

      - name: Update Cabal package index
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_cabal_update }}
        run: cabal update

      - name: Build site
        run: |
          ${{ github.event.inputs.force_rebuild == 'true' && 'cabal run site clean &&' || '' }} cabal run site build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: [hlint, build]
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4