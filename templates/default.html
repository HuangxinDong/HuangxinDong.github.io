<!doctype html>
<html lang="$lang$">
    <head>

        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>$siteTitle$ - $title$</title>
        <meta name="description" content="$description$">
        <link rel="canonical" href="$canonicalUrl$">
        <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml">

        <link rel="stylesheet" href="/css/site.css" />

        $if(hasMathJax)$
        <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
        $endif$

                <div class="sidebar-header">
                    <div class="logo">
                        <a href="/">Huangxin Dong</a>
                    </div>
                    <button
                        class="menu-toggle"
                        type="button"
                        aria-expanded="false"
                        aria-controls="sidebar-panel"
                        aria-label="Open navigation menu"

                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
                <div class="sidebar-panel" id="sidebar-panel">
                    <nav class="sidebar-nav site-links" aria-label="Primary">
                        <a href="/" $homeCurrent$>Home</a>
                        <a href="/about.html" $aboutCurrent$>About</a>
                        <a href="/posts.html" $postsCurrent$>Posts</a>
                        <a href="/projects.html" $projectsCurrent$>Projects</a>
                        <a href="/records.html" $recordsCurrent$>Records</a>
                    </nav>
                    <div class="sidebar-section">
                        <p class="sidebar-section-label">Links</p>
                        <nav class="sidebar-nav external-links" aria-label="External links">
                            <a href="https://dhx.vercel.app" target="_blank" rel="noreferrer">Notebook</a>
                            <a href="https://github.com/huangxindong" target="_blank" rel="noreferrer">GitHub</a>
                            <a href="https://www.douban.com/people/dddhx" target="_blank" rel="noreferrer">Douban</a>
                        </nav>
                    </div>
                </div>

                <footer class="container-content">

                        Created with <a href="http://jaspervdj.be/hakyll">Hakyll</a> &amp; <a href="https://obsidian.md/">Obsidian</a>
                        &nbsp;|&nbsp;
                        © 2026 Huangxin Dong
                    </div>
                </footer>
            </div>
        </div>
        <script src="/js/toc.js" defer></script>
        <script src="/js/nav.js" defer></script>
        <script src="/js/copy-code.js" defer></script>
        <script src="/js/records.js" defer></script>
        <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(r) { r.unregister(); });
            });
        }
        </script>
    </body>
</html>
