<article>
    <section class="post-meta" aria-label="Post metadata">
        $if(date)$
            <time class="date" datetime="$dateIso$">$date$</time>
        $endif$
        $if(author)$
            &nbsp;· $author$
        $endif$
        $if(modified)$
            <span class="modified">Updated <time datetime="$modifiedIso$">$modified$</time></span>
        $endif$
        $if(tags)$
            <span class="tags">$tags$</span>
        $endif$
    </section>
    <section>
        $body$
    </section>
    <section class="comments" aria-label="Comments">
        <script src="https://giscus.app/client.js"
                data-repo="HuangxinDong/HuangxinDong.github.io"
                data-repo-id="R_kgDOR4a7hw"
                data-category="Comments"
                data-category-id="DIC_kwDOR4a7h84C6HxR"
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="bottom"
                data-theme="noborder_light"
                data-lang="en"
                crossorigin="anonymous"
                async>
        </script>
    </section>
</article>
