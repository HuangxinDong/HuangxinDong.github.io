<div class="container-content">
    <main id="main-content" tabindex="-1">
        <article>
            <h1>$title$</h1>
            <section class="post-meta" aria-label="Post metadata">
                <p class="post-meta-main">
                    $if(date)$
                        <time class="date" datetime="$dateIso$">$metaDate$</time>
                    $endif$
                    $if(modified)$
                        <span class="post-meta-separator" aria-hidden="true">&middot;</span>
                        <span class="post-meta-inline">
                            <span class="post-meta-prefix">updated</span>
                            <time class="modified" datetime="$modifiedIso$">$metaModified$</time>
                        </span>
                    $endif$
                    <span class="post-meta-separator" aria-hidden="true">&middot;</span>
                    <span>$readTime$ min read ($wordCount$ words)</span>
                </p>
                $if(tags)$
                    <div class="tags">$tags$</div>
                $endif$
            </section>
            <section>
                $if(bilingual)$
                    <div class="bilingual-switcher" aria-label="Language switcher">
                        <button class="btn-zh active" aria-pressed="true">中文</button>
                        <button class="btn-en" aria-pressed="false">English</button>
                    </div>
                    <script src="/js/bilingual.js"></script>
                $endif$
                $body$
            </section>
            <section class="comments" aria-label="Comments">
                <script src="https://giscus.app/client.js"
                        data-repo="HuangxinDong/HuangxinDong.github.io"
                        data-repo-id="R_kgDOR4a7hw"
                        data-category="Comments"
                        data-category-id="DIC_kwDOR4a7h84C6HxR"
                        data-mapping="pathname"
                        data-strict="0"
                        data-reactions-enabled="1"
                        data-emit-metadata="0"
                        data-input-position="bottom"
                        data-theme="noborder_light"
                        data-lang="en"
                        crossorigin="anonymous"
                        async>
                </script>
            </section>
        </article>
    </main>
</div>
